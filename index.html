<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  /* 1. Remove all default spacing from the page itself */
  html, body {
    height: 100%;
    width: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden; /* Prevents double scrollbars */
  }

  /* 2. Force the table to expand to the full browser window */
  table {
    width: 100%;
    height: 100%;
    border-collapse: collapse; /* Removes gaps between cells */
    table-layout: fixed;       /* Optional: Forces columns to stay proportional */
  }

  /* 3. Ensure cells expand to fill the vertical space */
  td, th {
    border: 1px solid black; /* So you can see the boundaries */
    text-align: center;
    vertical-align: middle;
  }
</style>
</head>
<body>
HI HI HI HI 
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 table-container">
            <table class="table table-hover align-middle">
                <tbody>
                    <tr>
                        <td>
                            <img src="muryah.png" alt="muryah" class="img-thumbnail-custom">
                        </td>
                        </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
